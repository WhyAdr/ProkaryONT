# ==============================================================================
# pipeline.conf — Configuration for the bacterial ONT assembly pipeline
# ==============================================================================
# Usage:
#   Assembly (automated):   bash scripts/run_all.sh --config pipeline.conf
#   Taxonomy (manual):      bash scripts/04_taxonomy.sh --assembly ... --gtdbtk-db ...
#   Annotation (manual):    bash scripts/05_annotate_assess.sh --assembly ... --bakta-db ...
#
# CLI flags override values set here.
# Lines starting with # are comments. Blank lines are ignored.
# ==============================================================================

# ==========================================
# ASSEMBLY PIPELINE (run_all.sh, Stages 1–3)
# ==========================================

# --- Required inputs ---------------------------------------------------------
input_fastq=input.fastq.gz
sequencing_summary=sequencing_summary.txt
pod5_dir=pod5_dir/
sample_name=MyBacteria

# --- Compute -----------------------------------------------------------------
threads=128
read_type=ont_r10

# --- Filtlong ----------------------------------------------------------------
filtlong_min_length=200
filtlong_keep_percent=90

# --- Autocycler assembly -----------------------------------------------------
subsample_count=4
parallel_jobs=4
canu_parallel_jobs=2
# Uncomment to override genome size (skip re-estimation on filtered reads):
# genome_size_override=5000000
# Uncomment to change min subset read depth (default: 25):
# min_read_depth=25

# --- Dorado polishing --------------------------------------------------------
dorado_model=sup
dorado_min_qscore=7

# --- Behaviour ---------------------------------------------------------------
# Uncomment to skip manual curation pauses:
# skip_curation=true

# ==========================================
# DOWNSTREAM ANALYSIS (manual scripts)
# ==========================================
# Run these after reviewing assembly output.
# Update genus/species/gram after reviewing GTDB-Tk results.

# --- Databases (04_taxonomy.sh & 05_annotate_assess.sh) ----------------------
gtdbtk_data_path=/path/to/gtdbtk_db
bakta_db=/path/to/bakta_db
merqury_path=/path/to/merqury

# --- Bakta annotation (update after running 04_taxonomy.sh) ------------------
bakta_genus=Escherichia
bakta_species=coli
bakta_gram=?
bakta_translation_table=11

# --- BUSCO -------------------------------------------------------------------
busco_lineage=bacteria_odb10

# ==========================================
# ENSEMBLE ANNOTATION (06a–06e scripts)
# ==========================================

# --- Gene prediction merging ------------------------------------------------
gene_merge_mode=majority        # majority | union
overlap_threshold=0.80          # reciprocal overlap for "same gene" (0.0–1.0)

# --- Databases ---------------------------------------------------------------
genomad_db=/path/to/genomad_db
interproscan_db=/path/to/interproscan
kofam_profiles=/path/to/kofam/profiles
kofam_ko_list=/path/to/kofam/ko_list
dram_db=/path/to/dram_db

# --- Optional databases ------------------------------------------------------
# swissprot_dmnd=/path/to/swissprot.dmnd

# --- Optional: manual webserver imports --------------------------------------
# genemark_gff=/path/to/genemark_output.gff
# rast_gto=/path/to/rast_output.gto
